<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>末端租金精準估算與實戰練習室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #login-overlay { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: #0f172a; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center">
            <h2 class="text-xl font-bold mb-4">請輸入進入密碼</h2>
            <input type="password" id="password-input" class="w-full border border-slate-300 rounded-xl px-4 py-3 mb-4 text-center text-lg" placeholder="請輸入密碼">
            <button onclick="checkPassword()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl">進入工具</button>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        </div>

    <script>
        const secret = "1234"; // 您可以在這裡修改密碼
        function checkPassword() {
            if (document.getElementById('password-input').value === secret) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                localStorage.setItem('isLoggedIn', 'true');
            } else { alert('密碼錯誤'); }
        }
        if (localStorage.getItem('isLoggedIn') === 'true') {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }
    </script>
</body>
</html>
